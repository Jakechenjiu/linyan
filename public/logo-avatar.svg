<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1624"/>
      <stop offset="100%" stop-color="#060a10"/>
    </radialGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0e68c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f0e68c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bgGrad)"/>
  <rect width="400" height="400" rx="40" fill="url(#borderGlow)" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Ambient glow behind mark -->
  <circle cx="200" cy="180" r="140" fill="url(#avatarGlow)"/>

  <!-- Subtle star dots background -->
  <circle cx="80" cy="100" r="1" fill="#ffffff" opacity="0.15"/>
  <circle cx="320" cy="80" r="0.8" fill="#ffffff" opacity="0.1"/>
  <circle cx="340" cy="280" r="1.2" fill="#ffffff" opacity="0.12"/>
  <circle cx="60" cy="300" r="0.8" fill="#ffffff" opacity="0.1"/>
  <circle cx="150" cy="60" r="0.6" fill="#ffffff" opacity="0.08"/>
  <circle cx="280" cy="340" r="0.7" fill="#ffffff" opacity="0.09"/>

  <!-- === INKSTONE MARK === -->
  <g transform="translate(200, 160)">
    <!-- Orbiting ring -->
    <ellipse cx="0" cy="-55" rx="75" ry="8" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.2"
             stroke-dasharray="30 10 5 10"/>

    <!-- Inkstone body -->
    <rect x="-68" y="-38" width="136" height="76" rx="18" ry="18"
          fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.85"/>

    <!-- Inner well -->
    <rect x="-38" y="-24" width="76" height="44" rx="12" ry="12"
          fill="none" stroke="#00e5ff" stroke-width="1.8" opacity="0.4"/>

    <!-- Ink pool surface -->
    <rect x="-30" y="-18" width="60" height="32" rx="10" ry="10"
          fill="#00e5ff" opacity="0.06"/>

    <!-- Data lines -->
    <line x1="-22" y1="-12" x2="22" y2="-12" stroke="#00e5ff" stroke-width="0.6" opacity="0.2"/>
    <line x1="-22" y1="-6" x2="18" y2="-6" stroke="#00e5ff" stroke-width="0.6" opacity="0.15"/>
    <line x1="-22" y1="0" x2="24" y2="0" stroke="#00e5ff" stroke-width="0.6" opacity="0.12"/>
    <line x1="-22" y1="6" x2="14" y2="6" stroke="#00e5ff" stroke-width="0.6" opacity="0.1"/>
    <line x1="-22" y1="12" x2="20" y2="12" stroke="#00e5ff" stroke-width="0.6" opacity="0.08"/>

    <!-- === MAIN SPARK (灵) === -->
    <circle cx="0" cy="-62" r="7" fill="#00e5ff" opacity="0.95"/>
    <circle cx="0" cy="-62" r="18" fill="url(#sparkGlow2)" opacity="0.5"/>
    <!-- Outer glow ring -->
    <circle cx="0" cy="-62" r="28" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.15"/>

    <!-- Accent sparks -->
    <circle cx="-38" cy="-46" r="3" fill="#f0e68c" opacity="0.55"/>
    <circle cx="42" cy="-50" r="2.2" fill="#7c3aed" opacity="0.5"/>
    <circle cx="-52" cy="-28" r="1.5" fill="#00e5ff" opacity="0.3"/>
    <circle cx="56" cy="-32" r="1.8" fill="#f0e68c" opacity="0.35"/>
  </g>

  <!-- "灵砚" text -->
  <text x="200" y="290" font-family="'PingFang SC','Noto Serif SC','Microsoft YaHei',serif"
        font-size="52" font-weight="700" letter-spacing="16" fill="#ffffff" text-anchor="middle">
    灵砚
  </text>

  <!-- Subtitle -->
  <text x="200" y="330" font-family="'JetBrains Mono','Courier New',monospace"
        font-size="14" font-weight="400" letter-spacing="8" fill="#00e5ff" opacity="0.5" text-anchor="middle">
    LINGYAN AI
  </text>

</svg>
