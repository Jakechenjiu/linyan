<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵砚 — 抖音封面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 450px;
    overflow: hidden;
    background: #060a10;
    font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  }

  .cover {
    width: 1080px;
    height: 450px;
    position: relative;
    background:
      radial-gradient(ellipse 80% 60% at 30% 50%, rgba(0,229,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 75% 40%, rgba(124,58,237,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 70%, rgba(240,230,140,0.03) 0%, transparent 60%),
      linear-gradient(180deg, #0a101e 0%, #060a10 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
  }

  /* Star particles */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
  }

  /* Left section */
  .left {
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .brand-icon {
    width: 100px;
    height: 100px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 30px rgba(0,229,255,0.3));
  }

  .brand-name {
    font-family: 'Noto Serif SC', 'PingFang SC', serif;
    font-size: 72px;
    font-weight: 700;
    letter-spacing: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #00e5ff 40%, #7c3aed 80%, #f0e68c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .brand-sub {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 10px;
    color: rgba(0,229,255,0.5);
    margin-top: 4px;
  }

  .tagline {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 6px;
    margin-top: 16px;
  }

  /* Right section — module icons */
  .right {
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .module {
    width: 170px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(15,22,36,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
    transition: all 0.3s;
  }

  .module-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .module-title {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
  }

  .module-desc {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .module:nth-child(1) { border-color: rgba(0,229,255,0.15); }
  .module:nth-child(2) { border-color: rgba(124,58,237,0.15); }
  .module:nth-child(3) { border-color: rgba(240,230,140,0.15); }
  .module:nth-child(4) { border-color: rgba(0,229,255,0.12); }

  /* Decorative line */
  .decoration-line {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,229,255,0.15) 20%,
      rgba(124,58,237,0.2) 50%,
      rgba(240,230,140,0.1) 80%,
      transparent 100%);
  }

  .footer-text {
    position: absolute;
    bottom: 30px;
    left: 80px;
    right: 80px;
    text-align: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 4px;
  }

  /* Subtle animated glow on the left */
  .glow-orb {
    position: absolute;
    width: 300px;
    height: 200px;
    left: -50px;
    top: 50%;
    transform: translateY(-50%);
    background: radial-gradient(ellipse, rgba(0,229,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="cover">
  <!-- Background stars -->
  <div class="stars">
    <div class="star" style="width:2px;height:2px;top:15%;left:10%;opacity:0.3"></div>
    <div class="star" style="width:1px;height:1px;top:25%;left:85%;opacity:0.2"></div>
    <div class="star" style="width:1.5px;height:1.5px;top:60%;left:5%;opacity:0.25"></div>
    <div class="star" style="width:1px;height:1px;top:70%;left:90%;opacity:0.15"></div>
    <div class="star" style="width:2px;height:2px;top:40%;left:50%;opacity:0.2"></div>
    <div class="star" style="width:1px;height:1px;top:10%;left:40%;opacity:0.15"></div>
    <div class="star" style="width:1.5px;height:1.5px;top:80%;left:30%;opacity:0.2"></div>
    <div class="star" style="width:1px;height:1px;top:35%;left:70%;opacity:0.18"></div>
    <div class="star" style="width:2px;height:2px;top:50%;left:20%;opacity:0.12"></div>
    <div class="star" style="width:1px;height:1px;top:75%;left:65%;opacity:0.15"></div>
  </div>

  <div class="glow-orb"></div>

  <!-- Left: Brand -->
  <div class="left">
    <!-- Inline SVG icon -->
    <svg class="brand-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cGrad" x1="20" y1="30" x2="80" y2="75">
          <stop stop-color="#00e5ff"/>
          <stop offset="0.6" stop-color="#7c3aed"/>
        </linearGradient>
        <radialGradient id="sGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#f0e68c" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#f0e68c" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <ellipse cx="50" cy="28" rx="36" ry="5" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.25" stroke-dasharray="12 5 4 5"/>
      <rect x="14" y="34" width="72" height="48" rx="14" fill="none" stroke="url(#cGrad)" stroke-width="2.5" opacity="0.9"/>
      <rect x="24" y="42" width="52" height="28" rx="9" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="1.2"/>
      <rect x="30" y="47" width="40" height="18" rx="7" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.12)" stroke-width="0.8"/>
      <line x1="34" y1="53" x2="66" y2="53" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
      <line x1="34" y1="57" x2="60" y2="57" stroke="#00e5ff" stroke-width="0.5" opacity="0.15"/>
      <line x1="34" y1="61" x2="64" y2="61" stroke="#00e5ff" stroke-width="0.5" opacity="0.1"/>
      <circle cx="50" cy="14" r="5" fill="#00e5ff" opacity="0.9"/>
      <circle cx="50" cy="14" r="12" fill="url(#sGlow)" opacity="0.5"/>
      <circle cx="32" cy="26" r="2" fill="#f0e68c" opacity="0.5"/>
      <circle cx="70" cy="22" r="1.5" fill="#7c3aed" opacity="0.45"/>
    </svg>

    <div class="brand-name">灵砚</div>
    <div class="brand-sub">LINGYAN AI</div>
    <div class="tagline">AI 辅助创作平台</div>
  </div>

  <!-- Right: Four modules -->
  <div class="right">
    <div class="module">
      <div class="module-icon">📖</div>
      <div class="module-title">星图写作</div>
      <div class="module-desc">智能网文创作</div>
    </div>
    <div class="module">
      <div class="module-icon">🎬</div>
      <div class="module-title">光子发布</div>
      <div class="module-desc">视频一键生成</div>
    </div>
    <div class="module">
      <div class="module-icon">📝</div>
      <div class="module-title">灵思笔记</div>
      <div class="module-desc">双链知识管理</div>
    </div>
    <div class="module">
      <div class="module-icon">🔮</div>
      <div class="module-title">万象推演</div>
      <div class="module-desc">多智能体预测</div>
    </div>
  </div>

  <div class="decoration-line"></div>
  <div class="footer-text">免费开放 · 官网体验</div>
</div>
</body>
</html>
