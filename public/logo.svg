<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Cyan glow gradient -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold spark gradient -->
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0e68c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0e68c" stop-opacity="0"/>
    </radialGradient>
    <!-- Purple accent -->
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background glow circle -->
  <circle cx="100" cy="100" r="90" fill="url(#cyanGlow)"/>

  <!-- Inkstone body — rounded rectangle, traditional brush rest shape -->
  <rect x="44" y="68" width="112" height="72" rx="16" ry="16"
        fill="none"
        stroke="#00e5ff"
        stroke-width="2.5"
        opacity="0.9"/>

  <!-- Inkstone inner well — the hollow where ink pools -->
  <rect x="72" y="82" width="56" height="36" rx="10" ry="10"
        fill="none"
        stroke="#00e5ff"
        stroke-width="1.5"
        opacity="0.5"/>

  <!-- Ink pool — dark cyan fill -->
  <rect x="80" y="88" width="40" height="24" rx="8" ry="8"
        fill="#00e5ff"
        opacity="0.08"/>

  <!-- Rising spark 1 — the "灵" spirit, main spark above inkstone -->
  <circle cx="100" cy="42" r="5" fill="#00e5ff" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="42" r="14" fill="url(#sparkGlow)" opacity="0.5">
    <animate attributeName="r" values="10;18;10" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Small accent sparks -->
  <circle cx="76" cy="56" r="2" fill="#f0e68c" opacity="0.6"/>
  <circle cx="124" cy="50" r="1.5" fill="#7c3aed" opacity="0.5"/>

  <!-- Circuit/data lines — subtle tech motif on inkstone surface -->
  <line x1="88" y1="92" x2="112" y2="92" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="88" y1="98" x2="108" y2="98" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="88" y1="104" x2="114" y2="104" stroke="#00e5ff" stroke-width="0.5" opacity="0.15"/>

  <!-- Orbiting ring — representing AI/celestial -->
  <ellipse cx="100" cy="60" rx="48" ry="6" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.25"
           stroke-dasharray="20 8 4 8"/>

</svg>
